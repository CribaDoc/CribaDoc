services:
  db:
    image: postgres:16
    container_name: cribadoc_db
    environment:
      POSTGRES_DB: cribadoc
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - cribadoc_pgdata:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql

  api:
    build:
      context: .
      dockerfile: ./src/CribaDoc.Server/Dockerfile
    container_name: cribadoc_api
    depends_on:
      - db
    ports:
      - "8080:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development

  web:
    build:
      context: ./src/CribaDoc.Web
      dockerfile: ./Dockerfile
    container_name: cribadoc_web
    depends_on:
      - api
    ports:
      - "5173:5173"
    volumes:
      - ./src/CribaDoc.Web:/app
      - /app/node_modules
    environment:
      CHOKIDAR_USEPOLLING: "true"
    command: npm run dev -- --host 0.0.0.0 --port 5173

volumes:
  cribadoc_pgdata: